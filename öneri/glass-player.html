<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lg-bg-color: rgba(255, 255, 255, 0.12);
            --lg-highlight: rgba(255, 255, 255, 0.85);
            --lg-text: #ffffff;
            --lg-accent: #22d3ee;
            --lg-accent-dark: #0891b2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0c1821 0%, #1b2838 50%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }

        @keyframes gradient-shift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Animated background - neutral tones */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(20px, -30px) scale(1.05);
            }

            50% {
                transform: translate(-15px, 20px) scale(0.95);
            }

            75% {
                transform: translate(25px, 10px) scale(1.02);
            }
        }

        h1 {
            color: white;
            font-weight: 700;
            font-size: 2.5rem;
            text-align: center;
            margin: 0;
            z-index: 1;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-top: 0.5rem;
            z-index: 1;
        }

        /* ========== CONTAINER ========== */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .container--inline {
            flex-direction: row;
        }

        /* ========== GLASS CONTAINER ========== */
        .glass-container {
            position: relative;
            display: flex;
            font-weight: 600;
            color: var(--lg-text);
            cursor: pointer;
            background: transparent;
            border-radius: 1.5rem;
            overflow: visible;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(34, 211, 238, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2);
        }

        .glass-container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow:
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(34, 211, 238, 0.12);
        }

        .glass-container--large {
            min-width: 28rem;
        }

        .glass-container--rounded {
            border-radius: 1.5rem;
        }

        /* ========== LIGHT REFRACTION CORNERS ========== */
        .glass-container::before,
        .glass-container::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 40%, transparent 70%);
            filter: blur(8px);
            z-index: 10;
            pointer-events: none;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .glass-container::before {
            top: -20px;
            left: -20px;
        }

        .glass-container::after {
            bottom: -20px;
            right: -20px;
        }

        .glass-container:hover::before,
        .glass-container:hover::after {
            opacity: 1;
        }

        /* Corner light refraction elements */
        .glass-refraction {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .glass-refraction--top-left {
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.5) 0%,
                    rgba(255, 255, 255, 0.2) 20%,
                    transparent 50%);
            border-radius: 1.5rem 0 0 0;
        }

        .glass-refraction--top-right {
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: linear-gradient(225deg,
                    rgba(255, 255, 255, 0.3) 0%,
                    rgba(255, 255, 255, 0.1) 30%,
                    transparent 60%);
            border-radius: 0 1.5rem 0 0;
        }

        .glass-refraction--bottom-left {
            bottom: 0;
            left: 0;
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg,
                    rgba(255, 255, 255, 0.2) 0%,
                    transparent 60%);
            border-radius: 0 0 0 1.5rem;
        }

        .glass-refraction--bottom-right {
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            background: linear-gradient(315deg,
                    rgba(255, 255, 255, 0.35) 0%,
                    rgba(255, 255, 255, 0.15) 25%,
                    transparent 55%);
            border-radius: 0 0 1.5rem 0;
        }

        /* Edge light lines */
        .glass-edge {
            position: absolute;
            z-index: 6;
            pointer-events: none;
        }

        .glass-edge--top {
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.6) 30%,
                    rgba(255, 255, 255, 0.8) 50%,
                    rgba(255, 255, 255, 0.6) 70%,
                    transparent 100%);
        }

        .glass-edge--left {
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 1px;
            background: linear-gradient(180deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.5) 30%,
                    rgba(255, 255, 255, 0.7) 50%,
                    rgba(255, 255, 255, 0.5) 70%,
                    transparent 100%);
        }

        /* ========== PLAYER ========== */
        .player {
            display: flex;
            align-items: center;
            width: 100%;
            flex: 1 1 auto;
            justify-content: space-between;
        }

        .player__thumb {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }

        .player__img {
            width: 5rem;
            height: 5rem;
            object-fit: cover;
            margin: 0.25rem 0;
            border-radius: 0.75rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .player:hover .player__img {
            transform: scale(1.05);
        }

        .player__legend {
            display: flex;
            flex-direction: column;
            margin: 0 1rem;
        }

        .player__legend__title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .player__legend__sub-title {
            font-size: 0.9rem;
            font-weight: 400;
            margin: 0.25rem 0 0;
            opacity: 0.7;
            color: #fff;
        }

        .player__controls {
            margin-right: -0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .player__controls__btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .player__controls__btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        .player__controls__btn svg {
            fill: white;
            width: 16px;
            height: 16px;
        }

        .player__controls__btn--play {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, var(--lg-accent-dark) 0%, var(--lg-accent) 100%);
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.3);
        }

        .player__controls__btn--play:hover {
            background: linear-gradient(135deg, var(--lg-accent) 0%, #67e8f9 100%);
            box-shadow: 0 6px 30px rgba(34, 211, 238, 0.5);
        }

        .player__controls__btn--play svg {
            width: 20px;
            height: 20px;
            margin-left: 3px;
        }

        /* ========== GLASS LAYERS ========== */
        .glass-filter {
            position: absolute;
            inset: 0;
            z-index: 0;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: inherit;
        }

        .glass-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: var(--lg-bg-color);
            border-radius: inherit;
        }

        .glass-specular {
            position: absolute;
            inset: 0;
            z-index: 2;
            border-radius: inherit;
            overflow: hidden;
            box-shadow:
                inset 2px 2px 0 rgba(255, 255, 255, 0.4),
                inset -1px -1px 0 rgba(255, 255, 255, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-content {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 1rem 1.5rem;
        }

        .glass-content--inline {
            padding: 0.75rem 1.5rem 0.75rem 0.75rem;
            flex: 1 1 auto;
            justify-content: space-between;
        }

        /* ========== PROGRESS BAR ========== */
        .progress-container {
            position: relative;
            width: 100%;
            z-index: 1;
            margin-top: 1.5rem;
        }

        .progress-bar {
            position: relative;
            width: 28rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar__fill {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--lg-accent-dark) 0%, var(--lg-accent) 100%);
            border-radius: 2px;
            animation: progress 8s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            width: 28rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* ========== PLAYLIST ========== */
        .playlist {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 2rem;
            z-index: 1;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.25rem;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 28rem;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(10px);
            border-color: rgba(34, 211, 238, 0.3);
        }

        .playlist-item__img {
            width: 3rem;
            height: 3rem;
            border-radius: 0.5rem;
            object-fit: cover;
        }

        .playlist-item__info {
            flex: 1;
        }

        .playlist-item__title {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0;
        }

        .playlist-item__artist {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin: 0.25rem 0 0;
        }

        .playlist-item__duration {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {

            .glass-container--large,
            .progress-bar,
            .progress-time,
            .playlist-item {
                min-width: auto;
                width: calc(100vw - 4rem);
            }

            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>

    <h1>🎵 Glass Music Player</h1>
    <p class="subtitle">Glassmorphism UI tasarımı</p>

    <!-- Main Player -->
    <div class="container container--inline">
        <div class="glass-container glass-container--rounded glass-container--large">
            <div class="glass-filter"></div>
            <div class="glass-overlay"></div>
            <div class="glass-specular"></div>

            <!-- Light Refraction Corners -->
            <div class="glass-refraction glass-refraction--top-left"></div>
            <div class="glass-refraction glass-refraction--top-right"></div>
            <div class="glass-refraction glass-refraction--bottom-left"></div>
            <div class="glass-refraction glass-refraction--bottom-right"></div>

            <!-- Edge Light Lines -->
            <div class="glass-edge glass-edge--top"></div>
            <div class="glass-edge glass-edge--left"></div>

            <div class="glass-content glass-content--inline">

                <div class="player">
                    <div class="player__thumb">
                        <img class="player__img"
                            src='https://images.unsplash.com/photo-1619983081593-e2ba5b543168?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NDk1NzAwNDV8&ixlib=rb-4.1.0&q=80&w=400'
                            alt='Album Cover'>
                        <div class="player__legend">
                            <h3 class="player__legend__title">All Of Me</h3>
                            <span class="player__legend__sub-title">Nao</span>
                        </div>
                    </div>

                    <div class="player__controls">
                        <button class="player__controls__btn">
                            <svg viewBox="0 0 320 512">
                                <path fill="white"
                                    d="M267.5 440.6c9.5 7.9 22.8 9.7 34.1 4.4s18.4-16.6 18.4-29V96c0-12.4-7.2-23.7-18.4-29s-24.5-3.6-34.1 4.4l-192 160c-7.4 6.2-11.5 15.3-11.5 24.6s4.1 18.4 11.5 24.6l192 160z" />
                            </svg>
                        </button>
                        <button class="player__controls__btn player__controls__btn--play">
                            <svg viewBox="0 0 448 512">
                                <path fill="white"
                                    d="M424.4 214.7L72.4 6.6C43.8-10.3 0 6.1 0 47.9V464c0 37.5 40.7 60.1 72.4 41.3l352-208c31.4-18.5 31.5-64.1 0-82.6z" />
                            </svg>
                        </button>
                        <button class="player__controls__btn">
                            <svg viewBox="0 0 320 512">
                                <path fill="white"
                                    d="M52.5 440.6c-9.5 7.9-22.8 9.7-34.1 4.4S0 428.4 0 416V96C0 83.6 7.2 72.3 18.4 67s24.5-3.6 34.1 4.4l192 160c7.4 6.2 11.5 15.3 11.5 24.6s-4.1 18.4-11.5 24.6l-192 160z" />
                            </svg>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-bar__fill"></div>
        </div>
        <div class="progress-time">
            <span>1:24</span>
            <span>3:45</span>
        </div>
    </div>

    <!-- Playlist -->
    <div class="playlist">
        <div class="playlist-item">
            <img class="playlist-item__img"
                src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=100&h=100&fit=crop" alt="">
            <div class="playlist-item__info">
                <p class="playlist-item__title">Midnight City</p>
                <p class="playlist-item__artist">M83</p>
            </div>
            <span class="playlist-item__duration">4:03</span>
        </div>
        <div class="playlist-item">
            <img class="playlist-item__img"
                src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=100&h=100&fit=crop" alt="">
            <div class="playlist-item__info">
                <p class="playlist-item__title">Blinding Lights</p>
                <p class="playlist-item__artist">The Weeknd</p>
            </div>
            <span class="playlist-item__duration">3:22</span>
        </div>
        <div class="playlist-item">
            <img class="playlist-item__img"
                src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=100&h=100&fit=crop" alt="">
            <div class="playlist-item__info">
                <p class="playlist-item__title">Starboy</p>
                <p class="playlist-item__artist">Daft Punk</p>
            </div>
            <span class="playlist-item__duration">3:50</span>
        </div>
    </div>

</body>

</html>
