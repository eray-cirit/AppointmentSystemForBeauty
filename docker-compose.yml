# ==========================================
# Ciryt — Docker Compose (Full Stack)
# ==========================================
# Kullanım: docker compose up -d
# Dashboard: http://localhost:3001 (Grafana)
# Metrics:   http://localhost:9090 (Prometheus)
# ==========================================

services:
  # ==========================================
  # Go Backend API
  # ==========================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ciryt-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ciryt
      - DB_PASSWORD=ciryt2026
      - DB_NAME=ciryt_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=ciryt-super-secret-key-change-in-production-2026
      - JWT_EXPIRATION=24h
      - JWT_REFRESH_EXPIRATION=168h
      - SERVER_PORT=8080
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost
      - GIN_MODE=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ciryt-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # PostgreSQL 16
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ciryt-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ciryt
      - POSTGRES_PASSWORD=ciryt2026
      - POSTGRES_DB=ciryt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ciryt-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ciryt -d ciryt_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ciryt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ciryt-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ciryt-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ciryt-network

  # ==========================================
  # Prometheus (Monitoring)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ciryt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ciryt-network

  # ==========================================
  # Grafana (Dashboard)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: ciryt-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ciryt2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ciryt-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ciryt-network:
    driver: bridge
